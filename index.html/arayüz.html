<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Yol Bulma Projesi</title>
    <style>
        * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            font-family: "Comic Sans MS", "Segoe Script", cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 80px;
        }

        .left-panel {
            width: 420px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .upload-box {
            width: 100%;
            height: 240px;
            border: 3px dashed #fff;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            cursor: pointer;
            text-align: center;
            letter-spacing: 1px;
            transition: 0.3s ease;
            padding: 20px;
        }

        #canvasContainer {
            margin-top: 20px;
            position: relative;
            overflow: auto; /* Büyük resimler için kaydırma çubuğu */
            border: 2px dashed #ccc;
            border-radius: 10px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: none; /* Resim yüklenene kadar gizli */
            max-width: 100%; /* Sayfadan taşmaması için */
            cursor: crosshair;
        }

        .controls {
            margin-bottom: 20px;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        input[type="file"] {
            padding: 10px;
            background: #e1e4e8;
            border-radius: 5px;
            cursor: pointer;
        }

        #status {
            margin-top: 10px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Fotoğraf Üzerinde Yol Bulma (A*)</h2>
        
        <div class="controls">
            <label for="imageInput">Bir Harita/Fotoğraf Seçin:</label><br><br>
            <input type="file" id="imageInput" accept="image/*">

            <br><br> <button id="analizBtn" style="padding: 10px 20px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                2. Haritayı Analiz Et (Numaralandır)
            </button> 

            <div id="status">Lütfen bir fotoğraf yükleyin...</div>
        </div>

        <div id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>



    <script>
        // --- BU KISIM main.js İÇERİĞİ OLACAK ---
        const canvas = document.getElementById("mainCanvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const imageInput = document.getElementById("imageInput");
        const statusText = document.getElementById("status");

        imageInput.addEventListener("change", function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                const img = new Image();
                img.onload = function () {
                    // Canvas ayarları
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.style.display = "block";
                    
                    // Resmi çiz
                    ctx.drawImage(img, 0, 0);
                    
                    statusText.innerText = `Görsel yüklendi: ${img.width}x${img.height} piksel.`;
                    console.log("Ortak Canvas Hazır!");
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
    <script src="../js/harita.js"></script>
    <script src="../js/astar.js"></script>
    <script src="../js/rota.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
